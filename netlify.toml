[build]
  command = "bash scripts/netlify-build.sh"
  publish = "dist"

# CrowdyJS is cloned at build time (see scripts/netlify-build.sh).
# GraphQL schemas are vendored under vendor/schemas/ for codegen on Netlify.
# Fork deploys: set Site configuration → Environment variables (see README).
# VITE_ENV_HANDLE must match your devbox slug so mgmt proxy + game API align.
[build.environment]
  NODE_VERSION = "20"
  VITE_MANAGEMENT_API_URL = "/mgmt-api"
  VITE_MANAGEMENT_GRAPHQL_URL = "/mgmt-api/graphql"
  VITE_ENV_HANDLE = "e-zt0psk82q3bi"
  VITE_GAME_API_HTTP_URL = "https://game.e-zt0psk82q3bi.dev.cks-env.com/graphql"
  VITE_GAME_API_WS_URL = "wss://game.e-zt0psk82q3bi.dev.cks-env.com/graphql"
  VITE_APP_ID = "1"
  VITE_ORG_ID = "1"

# /mgmt-api proxy is generated into public/_redirects at build time (generate-netlify-redirects.sh).
# SPA fallback only — do not add /mgmt-api here or it will override the generated proxy.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
