[build]
  command = "bash scripts/netlify-build.sh"
  publish = "dist"

# CrowdyJS is cloned at build time (see scripts/netlify-build.sh).
# GraphQL schemas are vendored under vendor/schemas/ for codegen on Netlify.
# Fork deploys: set Site configuration → Environment variables (see README).
# Default env when users open the site without ?env= (any ?env= uses the dynamic proxy).
[build.environment]
  NODE_VERSION = "20"
  VITE_ENV_HANDLE = "e-zt0psk82q3bi"
  VITE_APP_ID = "1"
  VITE_ORG_ID = "1"

[functions]
  directory = "netlify/functions"

# /cks-proxy/* rewrites are generated into public/_redirects at build time.
# SPA fallback only — do not add those paths here or they will override the generated proxies.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
